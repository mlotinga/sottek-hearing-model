name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*"  # runs on any tag starting with "v"
  workflow_dispatch:    # allows test runs of workflow job

jobs:

  # -----------------------------
  # Test job — runs tests + build
  # -----------------------------

  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv (with retries)
        run: |
          for i in {1..5}; do
            curl -LsSf https://astral.sh/uv/install.sh | sh && break || sleep 5
          done

      - name: Pin Python version (3.11)
        run: |
          uv python install 3.11
          uv python pin 3.11

      - name: Sync dependencies (including dev)
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Test import build check
        run: |
          echo "Running import test..."
          uv run python -c "import sottek_hearing_model; print('✅ Import succeeded!')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -------------------------------------
  # Publish job — only runs if tests pass
  # -------------------------------------
          
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')  # only runs if tagged for release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv (with retries)
        run: |
          for i in {1..5}; do
            curl -LsSf https://astral.sh/uv/install.sh | sh && break || sleep 5
          done

      - name: Pin Python version (3.11)
        run: |
          uv python install 3.11
          uv python pin 3.11

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # TestPyPI publishing for pre-release versions (rc, alpha, beta)
      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b')
        env:
          UV_TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          echo "Uploading to TestPyPI..."
          uv publish --index testpypi --token "$UV_TEST_PYPI_TOKEN"

      # Full release publishing step (PyPI and TestPyPI)
      - name: Publish to PyPI and TestPyPI
        if: startsWith(github.ref_name, 'v') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b')
        env:
          UV_TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
          UV_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "Uploading to TestPyPI..."
          uv publish --index testpypi --token "$UV_TEST_PYPI_TOKEN"
          echo "Uploading to PyPI..."
          uv publish --token "$UV_PYPI_TOKEN"

      # Create a GitHub Release (with release notes)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
